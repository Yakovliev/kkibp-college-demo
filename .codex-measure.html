<!doctype html>
<meta charset="utf-8">
<style>
  body{margin:0;font-family:system-ui,sans-serif}
  iframe{display:block;border:0}
  pre{position:fixed;inset:0;margin:0;padding:16px;background:#fff;white-space:pre-wrap}
</style>
<iframe id="frame" title="measure"></iframe>
<pre id="out">measuring</pre>
<script>
const tests = [
  ['mobileClosed', 390, 844, false],
  ['mobileOpen', 390, 844, true],
  ['narrowOpen', 360, 780, true],
  ['tabletClosed', 820, 1080, false],
  ['tabletOpen', 820, 1080, true]
];
const frame = document.querySelector('#frame');
const out = document.querySelector('#out');
const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));
const rect = (el) => {
  if (!el) return null;
  const r = el.getBoundingClientRect();
  return { x: Math.round(r.x), y: Math.round(r.y), width: Math.round(r.width), height: Math.round(r.height) };
};
const visible = (win, el) => {
  if (!el) return false;
  const style = win.getComputedStyle(el);
  const r = el.getBoundingClientRect();
  return style.display !== 'none' && style.visibility !== 'hidden' && r.width > 0 && r.height > 0;
};
async function runTest([name, width, height, openMenu], index) {
  frame.style.width = `${width}px`;
  frame.style.height = `${height}px`;
  frame.src = `/index.html?codex-measure=${index}`;
  await new Promise(resolve => frame.addEventListener('load', resolve, { once: true }));
  await wait(250);
  const win = frame.contentWindow;
  const doc = frame.contentDocument;
  if (openMenu) {
    doc.querySelector('.nav-toggle')?.click();
    await wait(250);
  }
  const brand = doc.querySelector('.brand-text strong');
  const brandStyle = brand ? win.getComputedStyle(brand) : null;
  return [name, {
    viewport: { width, height },
    navOpen: doc.body.classList.contains('nav-open'),
    header: rect(doc.querySelector('.site-header')),
    brand: rect(brand),
    brandClientHeight: brand?.clientHeight || 0,
    brandScrollHeight: brand?.scrollHeight || 0,
    brandClipped: brand ? brand.scrollHeight > brand.clientHeight + 1 : null,
    brandLineClamp: brandStyle?.webkitLineClamp || brandStyle?.lineClamp || '',
    brandFontSize: brandStyle?.fontSize || '',
    headerLanguageVisible: visible(win, doc.querySelector('.header-language')),
    mobileLanguageVisible: visible(win, doc.querySelector('.mobile-language')),
    topbarDisplay: win.getComputedStyle(doc.querySelector('.topbar')).display,
    mobileLanguage: rect(doc.querySelector('.mobile-language')),
    searchButton: rect(doc.querySelector('.search-open')),
    menuButton: rect(doc.querySelector('.nav-toggle'))
  }];
}
(async () => {
  const result = {};
  for (let i = 0; i < tests.length; i += 1) {
    const [name, data] = await runTest(tests[i], i);
    result[name] = data;
  }
  out.textContent = JSON.stringify(result, null, 2);
  document.documentElement.dataset.done = 'true';
})();
</script>
